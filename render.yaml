services:
  - type: web
    name: whitenet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HOST
        value: "0.0.0.0"
